<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հրավեր Երիտասարդ Գիտնականներին</title>
    <!-- Հայերեն տառատեսակի ներբեռնում -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Armenian:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Ընդհանուր և Ֆոնի կարգավորումներ --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans Armenian', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow: hidden;
            position: relative;
        }

        /* --- Լողացող գունավոր բծեր (Blobs) --- */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #e0c3fc; /* Նուրբ մանուշակագույն */
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: #8ec5fc; /* Նուրբ երկնագույն */
            bottom: -50px;
            right: -50px;
            animation-delay: 2s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #ffecd2; /* Նուրբ դեղձագույն */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* --- Ապակե Քարտ (Glassmorphism Card) --- */
        .invitation-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 50px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Տեքստային տարրեր --- */
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #8ec5fc 0%, #e0c3fc 100%);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* --- Տեխնոլոգիական/Գիտական Պատկերակներ --- */
        .icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .icon-box:hover {
            transform: translateY(-5px) rotate(5deg);
        }

        /* --- Կոճակներ --- */
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.8);
            color: #667eea;
            border: 2px solid rgba(102, 126, 234, 0.3);
        }

        .btn-secondary:hover {
            background: white;
            transform: translateY(-3px);
            border-color: #667eea;
        }

        /* --- GitHub-ի հատուկ էֆեկտ (Ներդրումների գրաֆիկի ոճ) --- */
        .github-vibe {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 4px;
        }
        .github-vibe span {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            background: #ebedf0;
            animation: pulse 2s infinite;
        }
        .github-vibe span:nth-child(1) { background: #9be9a8; animation-delay: 0.1s; }
        .github-vibe span:nth-child(2) { background: #40c463; animation-delay: 0.3s; }
        .github-vibe span:nth-child(3) { background: #30a14e; animation-delay: 0.5s; }
        .github-vibe span:nth-child(4) { background: #216e39; animation-delay: 0.7s; }
        .github-vibe span:nth-child(5) { background: #40c463; animation-delay: 0.9s; }
        .github-vibe span:nth-child(6) { background: #9be9a8; animation-delay: 1.1s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <!-- Ֆոնային լողացող գույներ -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Հիմնական Քարտ -->
    <div class="invitation-card">
        <div class="badge">🚀 Գիտություն և Նորարարություն</div>
        
        <h1>Հրավեր Երիտասարդ Գիտնականներին</h1>
        
        <p class="subtitle">
            Միացիր մեր համայնքին, որտեղ գաղափարները վերածվում են իրականության։ 
            Կիսվիր քո հետազոտություններով, գտիր խմբի ընկերներ և ստեղծիր ապագան միասին։
        </p>

        <!-- Փոքրիկ պատկերակներ -->
        <div class="icons">
            <div class="icon-box" title="Կոդ">💻</div>
            <div class="icon-box" title="Գիտություն">🔬</div>
            <div class="icon-box" title="Տվյալներ">📊</div>
            <div class="icon-box" title="Ապագա">🌌</div>
        </div>

        <!-- Կոճակներ -->
        <div class="buttons">
            <a href="#" class="btn btn-primary">Միանալ Համայնքին</a>
            <a href="#" class="btn btn-secondary">Իմանալ ավելին</a>
        </div>

        <!-- GitHub-ի ոճավորված գրաֆիկ -->
        <div class="github-vibe">
            <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>

</body>
</html>
